<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 考試系統</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        
        h2 {
            color: #555;
            margin-bottom: 15px;
        }
        
        /* File Selection */
        .file-list {
            list-style: none;
        }
        
        .file-item {
            padding: 15px 20px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .file-item:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        /* Exam Mode */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .question-number {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .question-score {
            color: #666;
            font-size: 14px;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 25px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            padding: 15px 20px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #e8edff;
        }
        
        .option.correct {
            border-color: #28a745;
            background: #d4edda;
        }
        
        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        .option-label {
            font-weight: bold;
            margin-right: 10px;
            color: #667eea;
        }
        
        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 10px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #5a6fd6;
        }
        
        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .nav-btn.secondary {
            background: #6c757d;
        }
        
        .nav-btn.secondary:hover {
            background: #5a6268;
        }
        
        /* Progress Bar */
        .progress-container {
            margin-top: 20px;
        }
        
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        
        /* Results */
        .results {
            text-align: center;
        }
        
        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        
        .score-details {
            color: #666;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            padding: 15px 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
        }
        
        .restart-btn:hover {
            background: #5a6fd6;
        }
        
        /* Hidden */
        .hidden {
            display: none;
        }
        
        /* Question Navigator - Floating Panel */
        .question-nav-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .question-nav-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        /* Mobile optimizations */
        @media (max-width: 600px) {
            .question-nav-wrapper {
                position: relative;
                margin-top: 20px;
            }
            .question-nav {
                max-height: 150px;
            }
            .question-nav-padding {
                display: none;
            }
        }
        
        .question-nav-toggle:hover {
            background: #5a6fd6;
        }
        
        .question-nav-toggle .arrow {
            transition: transform 0.3s;
        }
        
        .question-nav-toggle.expanded .arrow {
            transform: rotate(180deg);
        }
        
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-top: 2px solid #667eea;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
        }
        
        .question-nav.show {
            display: flex;
        }
        
        .question-nav-padding {
            height: 50px;
        }
        
        .nav-dot {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            background: #f8f9fa;
            transition: all 0.3s;
        }
        
        .nav-dot:hover {
            background: #e9ecef;
        }
        
        .nav-dot.current {
            background: #667eea;
            color: white;
        }
        
        .nav-dot.answered {
            background: #d4edda;
            color: #155724;
        }
        
        .nav-dot.wrong-answer {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- File Selection Screen -->
        <div id="fileScreen" class="card">
            <h1>📚 MC 考試系統</h1>
            <h2>選擇試卷：</h2>
            <ul id="fileList" class="file-list"></ul>
        </div>
        
        <!-- Exam Screen -->
        <div id="examScreen" class="card hidden">
            <div class="question-header">
                <span id="questionNumber" class="question-number">題 1</span>
                <span id="questionScore" class="question-score">得分: 0</span>
            </div>
            
            <div id="questionText" class="question-text"></div>
            
            <div id="options" class="options"></div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
                <div id="progressText" class="progress-text">0 / 0 題</div>
            </div>
            
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn">◀ 上一題</button>
                <button id="submitBtn" class="nav-btn secondary hidden">提交試卷</button>
                <button id="nextBtn" class="nav-btn">下一題 ▶</button>
            </div>
            
            <div class="question-nav-padding"></div>
            
            <div class="question-nav-wrapper">
                <button id="navToggle" class="question-nav-toggle">
                    <span class="arrow">▲</span> 題目列表 <span id="navStats"></span>
                </button>
                <div id="questionNav" class="question-nav"></div>
            </div>
        </div>
        
        <!-- Results Screen -->
        <div id="resultScreen" class="card hidden">
            <div class="results">
                <h1>考試完成！</h1>
                <div id="scoreDisplay" class="score-display">0%</div>
                <div id="scoreDetails" class="score-details"></div>
                <button id="restartBtn" class="restart-btn">重新考試</button>
                <button id="changeFileBtn" class="restart-btn" style="background: #6c757d; margin-left: 10px;">更換試卷</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let questions = [];
        let currentIndex = 0;
        let answers = {};
        let correctAnswers = {};
        
        // DOM Elements
        const fileScreen = document.getElementById('fileScreen');
        const examScreen = document.getElementById('examScreen');
        const resultScreen = document.getElementById('resultScreen');
        const fileList = document.getElementById('fileList');
        const questionNumber = document.getElementById('questionNumber');
        const questionScore = document.getElementById('questionScore');
        const questionText = document.getElementById('questionText');
        const optionsDiv = document.getElementById('options');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const questionNav = document.getElementById('questionNav');
        const navToggle = document.getElementById('navToggle');
        const navStats = document.getElementById('navStats');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreDetails = document.getElementById('scoreDetails');
        const restartBtn = document.getElementById('restartBtn');
        const changeFileBtn = document.getElementById('changeFileBtn');
        
        // Load CSV files list from GitHub API
        async function loadCSVFiles() {
            try {
                // Fetch file list from GitHub API
                const response = await fetch('https://api.github.com/repos/nkscrypto8899/exammc/contents/');
                const files = await response.json();
                
                // Filter only CSV files
                const csvFiles = files
                    .filter(f => f.name.endsWith('.csv'))
                    .map(f => f.name);
                
                if (csvFiles.length === 0) {
                    fileList.innerHTML = '<li class="file-item">沒有找到試卷檔案</li>';
                    return;
                }
                
                csvFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.textContent = file.replace('.csv', '');
                    li.onclick = () => loadCSV(file);
                    fileList.appendChild(li);
                });
            } catch (error) {
                fileList.innerHTML = '<li class="file-item">無法載入試卷列表</li>';
            }
        }
        
        // Load CSV file
        let currentFilename = '';
        
        // LocalStorage keys
        function getStorageKey(filename) {
            return 'exammc_progress_' + filename;
        }
        
        // Save progress
        function saveProgress() {
            if (!currentFilename) return;
            const data = {
                currentIndex: currentIndex,
                answers: answers,
                questionCount: questions.length
            };
            localStorage.setItem(getStorageKey(currentFilename), JSON.stringify(data));
        }
        
        // Load progress
        function loadProgress(filename) {
            const saved = localStorage.getItem(getStorageKey(filename));
            if (saved) {
                return JSON.parse(saved);
            }
            return null;
        }
        
        // Clear progress
        function clearProgress() {
            if (!currentFilename) return;
            localStorage.removeItem(getStorageKey(currentFilename));
        }
        
        async function loadCSV(filename) {
            try {
                currentFilename = filename;
                const response = await fetch('https://raw.githubusercontent.com/nkscrypto8899/exammc/main/' + filename);
                const text = await response.text();
                parseCSV(text);
                
                // Check for saved progress
                const saved = loadProgress(filename);
                if (saved && saved.questionCount === questions.length && Object.keys(saved.answers).length > 0) {
                    const continueLast = confirm(`搵到上次進度：你做到第 ${saved.currentIndex + 1} 題，有 ${Object.keys(saved.answers).length} 題已答。要繼續嗎？\n\n[取消] = 重新開始`);
                    if (continueLast) {
                        currentIndex = saved.currentIndex;
                        answers = saved.answers;
                    } else {
                        clearProgress();
                    }
                }
                
                fileScreen.classList.add('hidden');
                examScreen.classList.remove('hidden');
                showQuestion(currentIndex);
                createNavDots();
            } catch (error) {
                alert('無法載入檔案: ' + error.message);
            }
        }
        
        // Parse CSV
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');
            
            questions = [];
            answers = {};
            correctAnswers = {};
            
            // Detect format based on headers
            const isNewFormat = headers[0].includes('题号') || headers[0].includes('题号');
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = parseCSVLine(lines[i]);
                
                if (isNewFormat && values.length >= 9) {
                    // New format: 题号,题型,题目,选项A,选项B,选项C,选项D,选项E,答案
                    const q = {
                        number: values[0],
                        type: values[1],
                        question: values[2],
                        A: values[3],
                        B: values[4],
                        C: values[5],
                        D: values[6],
                        E: values[7],
                        answer: values[8] ? values[8].trim() : ''
                    };
                    questions.push(q);
                    correctAnswers[q.number] = q.answer;
                } else if (values.length >= 7) {
                    // Old format: 題號,題目,選項A,選項B,選項C,選項D,答案
                    const q = {
                        number: values[0],
                        type: '单项选择题',
                        question: values[1],
                        A: values[2],
                        B: values[3],
                        C: values[4],
                        D: values[5],
                        E: '',
                        answer: values[6].trim()
                    };
                    questions.push(q);
                    correctAnswers[q.number] = q.answer;
                }
            }
        }
        
        // Parse CSV line (handle quoted values)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }
        
        // Show question
        function showQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            
            currentIndex = index;
            const q = questions[index];
            
            // Show question type
            const typeText = q.type || '單項選擇題';
            questionNumber.textContent = `題 ${q.number} (${typeText})`;
            questionText.textContent = q.question;
            
            // Build options based on question type
            let opts = [];
            
            if (typeText.includes('判斷') || typeText.includes('判断')) {
                // True/False question
                opts = [
                    { key: '對', text: '對' },
                    { key: '錯', text: '錯' }
                ];
            } else if (typeText.includes('多選') || typeText.includes('多选')) {
                // Multiple choice - show A-E
                opts = [];
                if (q.A) opts.push({ key: 'A', text: q.A });
                if (q.B) opts.push({ key: 'B', text: q.B });
                if (q.C) opts.push({ key: 'C', text: q.C });
                if (q.D) opts.push({ key: 'D', text: q.D });
                if (q.E) opts.push({ key: 'E', text: q.E });
            } else {
                // Single choice - show A-D
                opts = [
                    { key: 'A', text: q.A },
                    { key: 'B', text: q.B },
                    { key: 'C', text: q.C },
                    { key: 'D', text: q.D }
                ];
            }
            
            optionsDiv.innerHTML = '';
            opts.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                
                // Check if this option is selected
                const currentAnswer = answers[q.number] || '';
                if (typeText.includes('多選') || typeText.includes('多选')) {
                    // For multiple choice, check if key is in answer
                    if (currentAnswer.includes(opt.key)) {
                        div.classList.add('selected');
                    }
                } else {
                    if (currentAnswer === opt.key) {
                        div.classList.add('selected');
                    }
                }
                
                div.innerHTML = `<span class="option-label">${opt.key}.</span>${opt.text}`;
                div.onclick = () => selectOption(opt.key, typeText);
                optionsDiv.appendChild(div);
            });
            
            // Update progress
            const answered = Object.keys(answers).length;
            progressFill.style.width = `${(answered / questions.length) * 100}%`;
            progressText.textContent = `${answered} / ${questions.length} 題`;
            
            // Update buttons
            prevBtn.disabled = currentIndex === 0;
            nextBtn.textContent = currentIndex === questions.length - 1 ? '最後一題 ▶' : '下一題 ▶';
            
            // Show submit button on last question
            if (currentIndex === questions.length - 1 && Object.keys(answers).length === questions.length) {
                submitBtn.classList.remove('hidden');
            }
            
            updateNavDots();
            updateScore();
            scrollToCurrentDot();
            saveProgress();
        }
        
        // Select option
        function selectOption(key, typeText) {
            const q = questions[currentIndex];
            const isMultiple = typeText.includes('多選') || typeText.includes('多选');
            
            if (isMultiple) {
                // Toggle option for multiple choice
                const current = answers[q.number] || '';
                if (current.includes(key)) {
                    // Remove key
                    answers[q.number] = current.replace(key, '').replace(/^^/, '').replace(/$$/, '').trim();
                } else {
                    // Add key (sort alphabetically)
                    const arr = (current + key).split('').sort().join('');
                    answers[q.number] = arr;
                }
            } else {
                answers[q.number] = key;
            }
            
            // Update UI
            const opts = optionsDiv.querySelectorAll('.option');
            const currentAnswer = answers[q.number] || '';
            
            opts.forEach(opt => {
                opt.classList.remove('selected', 'correct', 'wrong');
                const label = opt.querySelector('.option-label').textContent.replace('.', '');
                
                if (isMultiple) {
                    if (currentAnswer.includes(label)) {
                        opt.classList.add('selected');
                    }
                } else {
                    if (currentAnswer === label) {
                        opt.classList.add('selected');
                    }
                }
            });
            
            updateNavDots();
            updateScore();
            saveProgress();
            
            // Show submit on last question
            if (currentIndex === questions.length - 1 && Object.keys(answers).length === questions.length) {
                submitBtn.classList.remove('hidden');
            }
        }
        
        // Update score
        function updateScore() {
            let correct = 0;
            Object.keys(answers).forEach(num => {
                const userAnswer = (answers[num] || '').split('').sort().join('');
                const correctAnswer = (correctAnswers[num] || '').split('').sort().join('');
                if (userAnswer === correctAnswer) {
                    correct++;
                }
            });
            questionScore.textContent = `得分: ${correct}`;
        }
        
        // Create navigation dots
        function createNavDots() {
            questionNav.innerHTML = '';
            questions.forEach((q, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.textContent = q.number;
                dot.dataset.index = index;
                dot.onclick = () => {
                    showQuestion(index);
                    // Scroll to the clicked dot
                    setTimeout(() => {
                        dot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }, 50);
                };
                questionNav.appendChild(dot);
            });
        }
        
        // Update navigation dots
        function updateNavDots() {
            const dots = questionNav.querySelectorAll('.nav-dot');
            let correct = 0, wrong = 0;
            dots.forEach((dot, index) => {
                dot.classList.remove('current', 'answered', 'wrong-answer');
                if (index === currentIndex) {
                    dot.classList.add('current');
                } else if (answers[questions[index].number]) {
                    if (answers[questions[index].number] === correctAnswers[questions[index].number]) {
                        dot.classList.add('answered');
                        correct++;
                    } else {
                        dot.classList.add('wrong-answer');
                        wrong++;
                    }
                }
            });
            // Update stats
            const answered = Object.keys(answers).length;
            navStats.textContent = `(${answered}/${questions.length})`;
        }
        
        // Toggle question nav panel
        navToggle.addEventListener('click', () => {
            questionNav.classList.toggle('show');
            navToggle.classList.toggle('expanded');
        });
        
        // Auto-scroll to current question dot when question changes
        function scrollToCurrentDot() {
            const dots = questionNav.querySelectorAll('.nav-dot');
            if (dots[currentIndex]) {
                dots[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }
        
        // Show results
        function showResults() {
            let correct = 0;
            Object.keys(answers).forEach(num => {
                const userAnswer = (answers[num] || '').split('').sort().join('');
                const correctAnswer = (correctAnswers[num] || '').split('').sort().join('');
                if (userAnswer === correctAnswer) {
                    correct++;
                }
            });
            
            const percentage = Math.round((correct / questions.length) * 100);
            scoreDisplay.textContent = `${percentage}%`;
            scoreDetails.textContent = `正確: ${correct} / ${questions.length} 題`;
            
            examScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            clearProgress();
        }
        
        // Event listeners
        prevBtn.onclick = () => showQuestion(currentIndex - 1);
        nextBtn.onclick = () => showQuestion(currentIndex + 1);
        
        submitBtn.onclick = () => {
            if (Object.keys(answers).length < questions.length) {
                if (!confirm(`你只完成 ${Object.keys(answers).length} / ${questions.length} 題，確定要提交嗎？`)) {
                    return;
                }
            }
            showResults();
        };
        
        restartBtn.onclick = () => {
            answers = {};
            currentIndex = 0;
            resultScreen.classList.add('hidden');
            examScreen.classList.remove('hidden');
            showQuestion(0);
            updateNavDots();
        };
        
        changeFileBtn.onclick = () => {
            answers = {};
            currentIndex = 0;
            resultScreen.classList.add('hidden');
            examScreen.classList.add('hidden');
            fileScreen.classList.remove('hidden');
            loadCSVFiles();
        };
        
        // Initialize
        loadCSVFiles();
    </script>
</body>
</html>
